name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - rc-patch
          - rc-minor
          - rc-major

permissions:
  contents: write
  models: read

jobs:
  release:
    uses: ac-on-ac/reusable-manual-release/.github/workflows/release.yml@v1.0.0
    with:
      version_type: ${{ inputs.version_type }}
